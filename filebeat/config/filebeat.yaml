# Filebeat 7.14.0 配置（仅采集宿主机挂载的日志，适配ELK Compose环境）
filebeat.inputs:
  # 仅采集宿主机挂载到容器内的日志（核心，唯一输入源，无干扰）
  - type: log
    enabled: true # 开启采集
    paths:
      - /var/log/*.log # 容器内Linux路径，和Docker挂载的目标路径完全一致
    # 强制采集配置，确保能扫描到所有日志
    ignore_older: 0 # 不忽略任何历史文件
    scan_frequency: 5s # 每5秒扫描一次文件变化，极致灵敏
    tail_files: false # 采集整个文件（历史内容+新增内容）
    backoff: 1s # 检测不到变化时，1秒重试一次

# 输出到Logstash（Compose网络内，通过服务名访问，无需改IP）
output.logstash:
  hosts: ["logstash:5044"]
  timeout: 30s # 延长超时，确保网络稳定

# 关闭Elasticsearch输出，避免冲突
output.elasticsearch:
  enabled: false

# 基础配置，关闭非必要功能，减少干扰
setup.kibana:
  host: "kibana:5601" # 连接容器内的Kibana
setup.ilm.enabled: false # 关闭索引生命周期管理（单节点测试用）
setup.template.enabled: false # 关闭默认模板（避免冲突）

# 日志配置，打印详细信息，方便排查
logging.level: info
logging.to_files: false
logging.to_stdout: true # 日志输出到控制台，docker compose logs能看到